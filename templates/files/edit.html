{% extends "base.html" %}
{% block title %}Edit {{ original_name }} · Secure Document Sharing{% endblock %}
{% block topnav %}{% include "components/topnav.html" %}{% endblock %}
{% block content %}
  <h1 class="page-title">Edit file</h1>
  <p class="lead"><strong class="mono">{{ original_name }}</strong> · your role: <strong>{{ file_role }}</strong></p>
  <div class="card">
    <form class="form-stack" method="post" action="{{ url_for('files.edit_file', file_id=file_id) }}">
      <div class="field">
        <label for="content">Content</label>
        <textarea id="content" name="content" rows="24" required>{{ content }}</textarea>
      </div>
      <div class="btn-row">
        <button type="submit" class="btn btn-primary">Save</button>
        <a class="btn btn-ghost" href="{{ url_for('home.home') }}">Cancel</a>
      </div>
    </form>
  </div>
{% endblock %}
